<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Tulisan | Muhdan Fyan</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <meta property="og:image" content="https://res.cloudinary.com/duntlhjil/image/upload/v1765759801/pisantri/fotosantri/xcbhj9tffpopikh0mvrv.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://res.cloudinary.com/duntlhjil/image/upload/v1765759801/pisantri/fotosantri/xcbhj9tffpopikh0mvrv.jpg">
  <!-- Markdown Renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-deep: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.8);
      --primary: #6366f1;
      --secondary: #a855f7;
      --text-main: #0f172a;
      --text-dim: #475569;
      --glass-border: rgba(15, 23, 42, 0.1);
      --card-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3 {
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Gradient Backgrounds */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
    }

    /* Glassmorphism Classes */
    .glass {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 1.5rem;
      box-shadow: var(--card-shadow);
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1.5rem 0;
      z-index: 100;
      transition: all 0.3s;
    }

    nav.scrolled {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      padding: 1rem 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Outfit', sans-serif;
    }

    /* Sections */
    section {
      padding: 6rem 0;
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 2.5rem;
      width: 100%;
    }

    .hero-text {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero h1 {
      font-size: 4.5rem;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--text-dim);
      margin-bottom: 2.5rem;
      max-width: 600px;
    }

    .hero-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .hero-image-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      order: -1;
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ffffff;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 2;
    }

    .profile-photo:hover {
      transform: scale(1.08) translateY(-5px);
      border-color: var(--primary);
    }

    .image-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      filter: blur(30px);
      opacity: 0.3;
      border-radius: 50%;
      z-index: 1;
      animation: glowPulse 4s infinite alternate;
    }

    @keyframes glowPulse {
      from {
        opacity: 0.2;
        transform: scale(1);
      }

      to {
        opacity: 0.4;
        transform: scale(1.1);
      }
    }

    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      padding: 0.8rem 2rem;
      border-radius: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px var(--primary);
    }

    .btn-outline {
      border: 1px solid var(--glass-border);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Section Headings */
    .section-header {
      margin-bottom: 4rem;
      text-align: center;
    }

    .section-header h2 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .section-header .line {
      width: 50px;
      height: 4px;
      background: var(--primary);
      margin: 0 auto;
      border-radius: 2px;
    }

    /* Grid Layouts */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    /* Skills */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.5rem;
    }

    .skill-card {
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s;
    }

    .skill-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
    }

    .skill-card i {
      color: var(--primary);
      margin-bottom: 1rem;
    }

    /* Experience Timeline */
    .timeline {
      position: relative;
      padding-left: 2rem;
      border-left: 2px solid var(--glass-border);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 3rem;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.7rem;
      top: 0.5rem;
      width: 1rem;
      height: 1rem;
      background: var(--primary);
      border-radius: 50%;
      border: 4px solid var(--bg-deep);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .timeline-date {
      color: var(--primary);
      font-weight: 700;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .timeline-content h3 {
      margin-bottom: 0.5rem;
    }

    .timeline-company {
      color: var(--text-dim);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .project-card {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0;
      /* Remove padding to allow image to span full width */
      transition: all 0.3s;
    }

    .project-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top;
      border-bottom: 1px solid var(--glass-border);
    }

    .project-info {
      padding: 2rem;
      flex-grow: 1;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
      color: var(--text-dim);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 3rem;
      }

      .profile-photo {
        width: 150px;
        height: 150px;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .nav-content {
        padding: 0 1rem;
      }
    }

    footer {
      padding: 4rem 0;
      text-align: center;
      border-top: 1px solid var(--glass-border);
      color: var(--text-dim);
    }

    /* SPA View States */
    .view-section {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .view-section.active {
      display: block;
      opacity: 1;
    }

    /* Back To Top Button */
    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--primary);
      color: white;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
    }

    .back-to-top.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Article Standard Styling */
    .article-content {
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.8;
      color: #1e293b;
      font-size: 1.15rem;
    }
    .article-content h1 { font-size: 3rem; margin-bottom: 2rem; color: #0f172a; line-height: 1.1; font-weight: 800; letter-spacing: -0.03em; }
    .article-content h2 { font-size: 2.2rem; margin-top: 3.5rem; margin-bottom: 1.5rem; color: #0f172a; font-weight: 700; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; }
    .article-content h3 { font-size: 1.6rem; margin-top: 2.5rem; color: #334155; font-weight: 600; }
    .article-content p { margin-bottom: 1.8rem; }
    .article-content img { display: block; width: 100%; height: auto; border-radius: 1.5rem; margin: 3rem 0; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    .article-content blockquote { 
      border-left: 6px solid var(--primary); 
      padding: 2rem 2.5rem; 
      background: rgba(99, 102, 241, 0.05); 
      border-radius: 0 1.5rem 1.5rem 0; 
      margin: 3rem 0; 
      font-style: italic;
      font-size: 1.25rem;
      color: #475569;
    }
    .article-content code { 
      background: #f1f5f9; 
      padding: 0.25rem 0.6rem; 
      border-radius: 0.5rem; 
      font-family: 'SFMono-Regular', monospace; 
      font-size: 0.9em;
      color: var(--primary);
    }
    .article-content pre { 
      background: #0f172a; 
      color: #f8fafc; 
      padding: 2rem; 
      border-radius: 1.2rem; 
      overflow-x: auto; 
      margin: 2.5rem 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .article-content a { color: var(--primary); text-decoration: none; font-weight: 600; border-bottom: 2px solid rgba(99, 102, 241, 0.2); transition: all 0.2s; }
    .article-content a:hover { border-bottom-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
    .article-content ul, .article-content ol { margin-bottom: 1.8rem; padding-left: 1.5rem; }
    .article-content li { margin-bottom: 0.8rem; }
    .article-content hr { border: none; border-top: 2px solid #f1f5f9; margin: 4rem 0; }

    /* Custom Scrollbar for Detail View */
    #detailView::-webkit-scrollbar {
      width: 8px;
    }

    #detailView::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    #detailView::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div class="gradient-bg"></div>

  <nav id="navbar">
    <div class="container nav-content">
      <a href="../" class="logo" style="text-decoration: none;">MF</a>
      <div class="cta-buttons" style="display: flex; align-items: center; gap: 1rem;">
        <button onclick="toggleLanguage()" class="btn btn-outline" 
          style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.8rem; background: rgba(99, 102, 241, 0.05); border-color: var(--primary);">
          <i data-lucide="languages" size="16"></i> <span id="langToggleText">ID</span>
        </button>
        <a href="mailto:muhdanfyan@gmail.com" class="btn btn-outline"
          style="padding: 0.5rem 1rem; border-radius: 0.5rem;" data-i18n="nav_contact">Kontak</a>
      </div>
    </div>
  </nav>

  <main id="mainContent">
    <!-- Home View (Hidden by default on this page) -->
    <div id="homeView" class="view-section">
      <!-- Content same as index.html -->
    </div>

    <!-- Writing List View -->
    <div id="writingListView" class="view-section active">
      <div class="container">
        <div class="section-header" style="padding-top: 8rem;">
          <h1 data-i18n="all_writing_title">Semua Tulisan</h1>
          <p style="color: var(--text-dim); margin-top: 1rem;" data-i18n="all_writing_desc">Kumpulan pemikiran dan tutorial dalam dunia pengembangan web.</p>
        </div>
        
        <div style="margin-bottom: 3rem; display: flex; flex-direction: column; gap: 1.5rem; align-items: center;">
          <input type="text" id="writingSearchInput" class="glass"
            style="width: 100%; max-width: 500px; padding: 1rem 1.5rem; border-radius: 1rem; outline: none;"
            placeholder="Cari judul artikel atau kategori..." oninput="updateWritingView()" data-i18n="search_writing">
          
          <div id="writingCategories" style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;">
            <!-- Dinamis -->
          </div>
        </div>

        <div class="projects-grid" id="writingFullGrid">
          <!-- Dinamis dari manifest -->
        </div>

        <div id="writingPagination" style="margin-top: 4rem; display: flex; justify-content: center; gap: 0.5rem;">
          <!-- Dinamis -->
        </div>
      </div>
    </div>
  </main>

  <div id="detailView" class="glass"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; overflow-y: auto; background: white; padding: 2rem;">
    <div class="container" style="max-width: 800px; padding: 4rem 0; position: relative;">
      <button onclick="closeDetail()" class="btn btn-outline"
        style="margin-bottom: 2rem; position: sticky; top: 0; z-index: 10; background: white;"><i
          data-lucide="arrow-left"></i>
        Kembali</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <div id="backToTop" class="back-to-top" onclick="window.scrollTo(0,0)">
    <i data-lucide="arrow-up"></i>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2026 Muhdan Fyan Syah Sofian. Made with passion & code.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Init Lucide
    lucide.createIcons();

    // Init AOS
    AOS.init({
      duration: 1000,
      once: true,
      offset: 100
    });

    // Navbar Scroll Effect & Back To Top
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      const btt = document.getElementById('backToTop');
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
        btt.classList.add('visible');
      } else {
        navbar.classList.remove('scrolled');
        btt.classList.remove('visible');
      }
    });

    // Language Management
    const translations = {
      id: {
        nav_contact: 'Kontak',
        back_btn: 'Kembali',
        read_article: 'Baca Artikel',
        view_detail: 'Lihat Detail',
        visit_site: 'Visit Site',
        all_writing_title: 'Semua Tulisan',
        all_writing_desc: 'Kumpulan pemikiran dan tutorial dalam dunia pengembangan web.',
        search_writing: 'Cari judul artikel atau kategori...',
        footer_copy: '&copy; 2026 Muhdan Fyan Syah Sofian. Made with passion & code.'
      },
      en: {
        nav_contact: 'Contact',
        back_btn: 'Back',
        read_article: 'Read Article',
        view_detail: 'View Detail',
        visit_site: 'Visit Site',
        all_writing_title: 'All Writings',
        all_writing_desc: 'A collection of thoughts and tutorials in the world of web development.',
        search_writing: 'Search article title or category...',
        footer_copy: '&copy; 2026 Muhdan Fyan Syah Sofian. Made with passion & code.'
      }
    };

    let currentLang = localStorage.getItem('lang') || 
                      (navigator.language.toLowerCase().startsWith('id') ? 'id' : 'en');

    function toggleLanguage() {
      currentLang = currentLang === 'id' ? 'en' : 'id';
      localStorage.setItem('lang', currentLang);
      applyTranslations();
      initContent();
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
          if (el.tagName === 'INPUT') {
            el.placeholder = translations[currentLang][key];
          } else {
            el.innerHTML = translations[currentLang][key];
          }
        }
      });
      document.getElementById('langToggleText').innerText = currentLang === 'id' ? 'ID' : 'EN';
      document.documentElement.lang = currentLang;
    }

    // Dynamic Content Loading
    let manifestData = null;
    let writingPageState = {
      page: 1,
      limit: 6,
      filter: '',
      category: 'All'
    };

    async function initContent() {
      try {
        const response = await fetch('../data/manifest.json?v=' + new Date().getTime());
        manifestData = await response.json();
        
        setupWritingCategories();
        updateWritingView();
        
        handleRouting();
      } catch (error) {
        console.error('Error loading manifest:', error);
      }
    }

    function setupWritingCategories() {
      const uniqueCategories = [...new Set(manifestData.writing.map(w => currentLang === 'en' ? (w.category_en || w.category) : w.category))];
      const categories = ['All', ...uniqueCategories];
      const container = document.getElementById('writingCategories');
      if (!container) return;
      container.innerHTML = categories.map(cat => `
        <button onclick="filterWritingByCategory('${cat}')" class="tag ${writingPageState.category === cat ? 'active' : ''}" 
          style="cursor: pointer; border: 1px solid var(--primary); ${writingPageState.category === cat ? 'background: var(--primary); color: white;' : ''}">
          ${cat}
        </button>
      `).join('');
    }

    function filterWritingByCategory(cat) {
      writingPageState.category = cat;
      writingPageState.page = 1;
      setupWritingCategories();
      updateWritingView();
    }

    function updateWritingView() {
      const searchInput = document.getElementById('writingSearchInput');
      writingPageState.filter = searchInput ? searchInput.value.toLowerCase() : '';
      
      let filtered = manifestData.writing.filter(w => {
        const title = currentLang === 'en' ? (w.title_en || w.title) : w.title;
        const category = currentLang === 'en' ? (w.category_en || w.category) : w.category;

        const matchesSearch = title.toLowerCase().includes(writingPageState.filter) || 
                            category.toLowerCase().includes(writingPageState.filter);
        const matchesCategory = writingPageState.category === 'All' || category === writingPageState.category;
        return matchesSearch && matchesCategory;
      });

      const totalPages = Math.ceil(filtered.length / writingPageState.limit);
      const start = (writingPageState.page - 1) * writingPageState.limit;
      const paginated = filtered.slice(start, start + writingPageState.limit);

      renderGrid('writingFullGrid', paginated, 'tulisan');
      renderWritingPagination(totalPages);
    }

    function renderWritingPagination(totalPages) {
      const container = document.getElementById('writingPagination');
      if (!container || totalPages <= 1) {
        if (container) container.innerHTML = '';
        return;
      }

      let html = '';
      for (let i = 1; i <= totalPages; i++) {
        html += `
          <button onclick="changeWritingPage(${i})" class="btn ${writingPageState.page === i ? 'btn-primary' : 'btn-outline'}" 
            style="padding: 0.5rem 1rem; min-width: 3rem; justify-content: center;">
            ${i}
          </button>
        `;
      }
      container.innerHTML = html;
    }

    function changeWritingPage(p) {
      writingPageState.page = p;
      updateWritingView();
      window.scrollTo(0, document.getElementById('writingListView').offsetTop);
    }

    function renderGrid(containerId, items, type) {
      const grid = document.getElementById(containerId);
      if (!grid) return;
      grid.innerHTML = items.map((item, index) => {
        const isWriting = type === 'tulisan';
        const title = currentLang === 'en' ? (item.title_en || item.title) : item.title;
        const desc = currentLang === 'en' ? (item.description_en || item.description) : item.description;
        const cat = currentLang === 'en' ? (item.category_en || item.category) : item.category;
        const btnText = isWriting ? translations[currentLang].read_article : translations[currentLang].view_detail;

        const imagePath = item.image.startsWith('http') ? item.image : '../' + item.image;
        const linkPath = isWriting ? `../tulisan/${item.slug}/` : `../portofolio/${item.slug}/`;

        return `
        <div class="project-card glass" data-aos="zoom-in" data-aos-delay="${index * 50}">
          ${item.image ? `<img src="${imagePath}" class="project-image" alt="${title}" style="height: ${isWriting ? '220px' : '180px'}; object-fit: cover;">` : ''}
          <div class="project-info">
            ${isWriting ? `<span class="tag" style="background: rgba(99, 102, 241, 0.1); color: var(--primary); font-weight: 600; margin-bottom: 0.8rem; display: inline-block;">${cat}</span>` : ''}
            <h3 style="font-size: 1.4rem; margin-bottom: 0.5rem;">${title}</h3>
            <p style="color: var(--text-dim); font-size: 0.95rem; margin-top: 0.5rem; line-height: 1.5;">${desc}</p>
            <div class="project-tags" style="margin-top: 1.2rem; border-top: 1px solid rgba(15, 23, 42, 0.05); padding-top: 1rem;">
              <span class="tag"><i data-lucide="calendar" size="12" style="display: inline; vertical-align: middle; margin-right: 4px;"></i> ${item.year || item.date}</span>
              ${!isWriting ? `<span class="tag">${cat}</span>` : ''}
            </div>
            <div style="display: flex; gap: 0.8rem; margin-top: 1.5rem;">
              <a href="${linkPath}" class="btn ${isWriting ? 'btn-primary' : 'btn-outline'}" style="padding: 0.6rem 1.2rem; font-size: 0.85rem; flex: 1; justify-content: center;">
                ${btnText}
              </a>
              ${item.url && !isWriting ? `<a href="${item.url}" target="_blank" class="btn btn-primary" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">${translations[currentLang].visit_site}</a>` : ''}
            </div>
          </div>
        </div>
      `}).join('');
      lucide.createIcons();
      AOS.refresh();
    }

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
      const activeView = document.getElementById(viewId);
      activeView.classList.add('active');
    }

    async function handleRouting() {
      const hash = window.location.hash;
      if (hash.startsWith('#/tulisan/')) {
        const slug = hash.split('/')[2];
        await showDetail('tulisan', slug);
      }
    }

    async function showDetail(type, slug) {
      const detailView = document.getElementById('detailView');
      const detailContent = document.getElementById('detailContent');

      detailView.style.display = 'block';
      document.body.style.overflow = 'hidden';

      let baseFilePath = `../tulisan/${slug}/tulisan`;

      const filePath = currentLang === 'en' ? `${baseFilePath}.en.md` : `${baseFilePath}.md`;

      try {
        let response = await fetch(filePath);
        if (!response.ok && currentLang === 'en') {
          response = await fetch(`${baseFilePath}.md`);
          const markdown = await response.text();
          detailContent.innerHTML = `<div style="background: #fff9c4; padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; font-size: 0.9rem;">English translation not available yet. Showing Indonesian version.</div><div class="article-content">${marked.parse(markdown)}</div>`;
        } else {
          if (!response.ok) throw new Error('File not found');
          const markdown = await response.text();
          detailContent.innerHTML = `<div class="article-content">${marked.parse(markdown)}</div>`;
        }
      } catch (error) {
        detailContent.innerHTML = `<div class="article-content"><h2>Konten tidak ditemukan</h2><p>Maaf, detail untuk "${slug}" belum tersedia.</p></div>`;
      }
    }

    function closeDetail() {
      const detailView = document.getElementById('detailView');
      detailView.style.display = 'none';
      document.body.style.overflow = 'auto';
      history.pushState("", document.title, window.location.pathname + window.location.search);
    }

    document.addEventListener('DOMContentLoaded', () => {
      applyTranslations();
      initContent();
    });

  </script>
</body>

</html>
